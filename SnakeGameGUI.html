<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">

    <meta name="viewport"
          content="width=device-width, height=device-height, user-scalable=0"/>

    <title>SnakeGameGUI</title>

    <style>
        html, body {
            padding: 0;
            margin: 0;
            overflow: hidden;
            height: 100%;
        }

        #screen {
            width: 100%;
            height: 100%;
        }
    </style>
</head>

<body onload="init()">

    <figure style="overflow:visible;" id="qtspinner">
        <center style="margin-top:1.5em; line-height:150%">
            <img src="qtlogo.svg" width="320" height="200">
            <strong>Qt for WebAssembly: SnakeGameGUI</strong>
            <div id="qtstatus"></div>
            <noscript>
                JavaScript is disabled. Please enable JavaScript to use this application.
            </noscript>
        </center>
    </figure>

    <div id="screen"></div>

    <script>
        async function init()
        {
            const spinner = document.querySelector('#qtspinner');
            const screen = document.querySelector('#screen');
            const status = document.querySelector('#qtstatus');

            const showUi = (ui) => {
                [spinner, screen].forEach(e => e.style.display = 'none');
                ui.style.display = 'block';
            }

            try {
                showUi(spinner);
                status.innerHTML = 'Loading...';

                await qtLoad({
                    qt: {
                        onLoaded: () => showUi(screen),
                        onExit: exitData => {
                            status.innerHTML = 'Application exit';
                            showUi(spinner);
                        },
                        entryFunction: window.SnakeGameGUI_entry,
                        containerElements: [screen],
                    }
                });

            } catch (e) {
                console.error(e);
            }
        }
    </script>

    <script src="SnakeGameGUI.js"></script>
    <script src="qtloader.js"></script>

</body>
</html>
